<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Research Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  :root{
    --paper:#FAFAF7; --ink:#191917; --muted:#75736B; --line:#E6E3DA;
    --green:#1B5E3F; --green-soft:#E8F0EB; --amber:#B5751A; --amber-soft:#FBF1DF;
    --red:#A33A33; --red-soft:#F8EBE9; --card:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.55}
  .mono{font-family:'JetBrains Mono',monospace}
  .wrap{max-width:920px;margin:0 auto;padding:32px 24px 80px}
  header{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:28px}
  .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;letter-spacing:-.5px}
  .logo .dot{color:var(--green)}
  .tagline{color:var(--muted);font-size:13px}
  nav{margin-left:auto;display:flex;gap:4px}
  nav button{font-family:'JetBrains Mono',monospace;font-size:12px;background:none;border:1px solid transparent;
    padding:6px 12px;border-radius:6px;cursor:pointer;color:var(--muted)}
  nav button.on{background:var(--ink);color:var(--paper)}
  nav button:hover:not(.on){border-color:var(--line)}

  .search{display:flex;gap:10px;margin-bottom:8px}
  .search input{flex:1;font-family:'JetBrains Mono',monospace;font-size:15px;padding:14px 16px;
    border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink)}
  .search input:focus{outline:none;border-color:var(--green)}
  .search button{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:14px;padding:0 22px;
    background:var(--green);color:#fff;border:none;border-radius:10px;cursor:pointer}
  .search button:disabled{opacity:.5;cursor:default}
  .hint{color:var(--muted);font-size:12px;margin-bottom:28px}
  .hint span{font-family:'JetBrains Mono',monospace;background:var(--card);border:1px solid var(--line);
    padding:2px 7px;border-radius:5px;cursor:pointer;margin-right:6px}

  .stream{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden;margin-bottom:24px}
  .stream-head{padding:12px 16px;border-bottom:1px solid var(--line);font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:p 1.2s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  .ev{padding:9px 16px;border-bottom:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:12.5px;
    display:flex;align-items:center;gap:10px;animation:in .25s ease}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ev:last-child{border-bottom:none}
  .agent-tag{font-weight:700;padding:1px 7px;border-radius:4px;font-size:11px}
  .agent-quant{background:var(--green-soft);color:var(--green)}
  .agent-news{background:#EAEFF6;color:#2D5C8A}
  .agent-filings{background:#F1ECF7;color:#5B3E86}
  .agent-synth{background:var(--amber-soft);color:var(--amber)}
  .lat{margin-left:auto;color:var(--muted)}
  .ok{color:var(--green)} .fail{color:var(--red)}

  .report{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden}
  .r-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:16px}
  .r-ticker{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;letter-spacing:-1px}
  .r-co{color:var(--muted);font-size:13px;margin-top:2px}
  .sent{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
    padding:6px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .sent-bullish{background:var(--green-soft);color:var(--green)}
  .sent-neutral{background:#EEEDE7;color:var(--muted)}
  .sent-bearish{background:var(--red-soft);color:var(--red)}
  .summary{padding:18px 22px;border-bottom:1px solid var(--line);font-size:15px}
  .section{padding:18px 22px;border-bottom:1px solid var(--line)}
  .section h3{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin-bottom:12px}
  .claim{font-size:14.5px;margin-bottom:11px;line-height:1.6;position:relative}
  .claim.low{background:var(--amber-soft);border-left:3px solid var(--amber);padding:8px 12px;border-radius:0 6px 6px 0;margin-left:-2px}
  .cite{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;
    background:var(--green-soft);color:var(--green);padding:1px 6px;border-radius:4px;margin-left:6px;
    cursor:help;vertical-align:middle;position:relative}
  .cite .tip{display:none;position:absolute;bottom:130%;left:0;width:240px;background:var(--ink);color:var(--paper);
    font-family:'Inter';font-size:11.5px;padding:8px 10px;border-radius:8px;z-index:20;line-height:1.4;font-weight:400}
  .cite:hover .tip{display:block}
  .tip b{color:#9FD8BC}
  .risks{padding:18px 22px}
  .risks h3{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
  .risks li{font-size:14px;margin-bottom:6px;list-style:none;padding-left:18px;position:relative}
  .risks li:before{content:'!';position:absolute;left:0;color:var(--amber);font-weight:700;font-family:'JetBrains Mono'}

  .price-table{padding:18px 22px;border-bottom:1px solid var(--line)}
  .price-table h3{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);margin-bottom:10px}
  .ptable{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:12px}
  .ptable th{text-align:right;padding:7px 10px;border-bottom:1px solid var(--line);color:var(--muted);font-weight:500;font-size:11px;
    text-transform:uppercase;letter-spacing:.3px}
  .ptable th:first-child{text-align:left}
  .ptable td{text-align:right;padding:7px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
  .ptable td:first-child{text-align:left;color:var(--muted)}
  .ptable tr:hover td{background:var(--paper)}
  .ptable .pos{color:var(--green)} .ptable .neg{color:var(--red)}

  .scorecard{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:24px}
  .score{background:var(--card);padding:16px}
  .score .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px}
  .score .l{font-size:11px;color:var(--muted);margin-top:2px}
  .score .bar{height:3px;border-radius:2px;background:var(--line);margin-top:8px;overflow:hidden}
  .score .bar i{display:block;height:100%;background:var(--green)}

  table{width:100%;border-collapse:collapse}
  .dash th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.5px;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line)}
  .dash td{padding:12px;border-bottom:1px solid var(--line);font-size:13px}
  .dash tr{cursor:pointer}
  .dash tr:hover td{background:var(--paper)}
  .dash .tk{font-family:'JetBrains Mono',monospace;font-weight:700}
  .pill{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
  .pill-good{background:var(--green-soft);color:var(--green)}
  .pill-mid{background:var(--amber-soft);color:var(--amber)}
  .pill-bad{background:var(--red-soft);color:var(--red)}

  .audit{margin-top:24px;border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden}
  .audit summary{padding:14px 18px;font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;color:var(--muted)}
  .call{padding:10px 18px;border-top:1px solid var(--line);font-family:'JetBrains Mono',monospace;font-size:11.5px}
  .call pre{background:var(--paper);padding:8px;border-radius:6px;margin-top:6px;overflow-x:auto;font-size:11px;white-space:pre-wrap}
  .empty{text-align:center;color:var(--muted);padding:50px;font-size:14px}
</style>
</head>
